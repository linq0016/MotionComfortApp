name: MotionComfort
options:
  bundleIdPrefix: com.example
settings:
  base:
    SWIFT_VERSION: 6.0
    IPHONEOS_DEPLOYMENT_TARGET: 26.0
    MARKETING_VERSION: 0.5.1
    CURRENT_PROJECT_VERSION: 0.5.1
targets:
  MotionComfortApp:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    settings:
      base:
        DEVELOPMENT_TEAM: 9NWVQ7RFAT
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: App/Info.plist
        MARKETING_VERSION: 0.5.1
        CURRENT_PROJECT_VERSION: 0.5.1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.LNQ.MotionComfortApp.dev
        SUPPORTED_PLATFORMS: iphoneos iphonesimulator
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        TARGETED_DEVICE_FAMILY: 1
    sources:
      - App/Sources
      - path: App/Assets.xcassets
        buildPhase: resources
    resources:
      - path: Audio/Resources/GStringsFinal.wav
    preBuildScripts:
      - name: Copy Melodic Asset
        script: cp "${SRCROOT}/Audio/Resources/GStringsFinal.wav" "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/GStringsFinal.wav"
        inputFiles:
          - Audio/Resources/GStringsFinal.wav
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/GStringsFinal.wav
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: MotionComfort
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: 0.5.1
        CFBundleVersion: 0.5.1
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSCameraUsageDescription: Camera access is used to show the live-view comfort mode with real-world scene guidance and adaptive edge overlays.
        NSMotionUsageDescription: Motion data is used to draw peripheral comfort guides that help reduce passenger discomfort in vehicles.
        UIBackgroundModes:
          - audio
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    dependencies:
      - target: MotionComfortCore
      - target: MotionComfortVisual
      - target: MotionComfortAudio
  MotionComfortCore:
    type: framework
    platform: iOS
    deploymentTarget: "26.0"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    sources:
      - Core/Sources
  MotionComfortVisual:
    type: framework
    platform: iOS
    deploymentTarget: "26.0"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    sources:
      - Visual/Sources
    dependencies:
      - target: MotionComfortCore
  MotionComfortAudio:
    type: framework
    platform: iOS
    deploymentTarget: "26.0"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    sources:
      - Audio/Sources
    dependencies:
      - target: MotionComfortCore
  MotionComfortCoreTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    sources:
      - Tests/MotionComfortCoreTests
    dependencies:
      - target: MotionComfortCore
